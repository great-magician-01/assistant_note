<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Brand gradient: cool sky-blue -> indigo, matches the app accent + avatar gradient -->
    <linearGradient id="bg" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="paper" x1="14" y1="18" x2="42" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>

  <!-- Note / document -->
  <rect x="14" y="18" width="28" height="36" rx="4" fill="url(#paper)"/>
  <!-- folded corner -->
  <path d="M36 18h6v6a6 6 0 0 1-6-6Z" fill="#cfe4f7"/>

  <!-- text lines: title (accent) + body -->
  <rect x="20" y="27" width="16" height="2.8" rx="1.4" fill="#0284c7"/>
  <rect x="20" y="34" width="18" height="2.8" rx="1.4" fill="#94a3b8"/>
  <rect x="20" y="41" width="12" height="2.8" rx="1.4" fill="#94a3b8"/>

  <!-- AI sparkles (gold), seated above / beside the note so they read clearly at small sizes -->
  <path d="M47 7 Q47 13 53 13 Q47 13 47 19 Q47 13 41 13 Q47 13 47 7 Z" fill="#fbbf24"/>
  <path d="M52 24 Q52 27 55 27 Q52 27 52 30 Q52 27 49 27 Q52 27 52 24 Z" fill="#fcd34d"/>
</svg>
